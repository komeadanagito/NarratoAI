openapi: 3.1.0

info:
  title: NarratoAI 批量视频处理 API
  version: 1.0.0
  description: |
    为“极速批量去重与 AI 解说”单页面提供的最小后端接口。
    前端上传视频、创建批次并轮询进度，处理完成后展示输出路径或下载视频。

    AI 供应商的 API Key 和模型参数由服务端配置，不通过业务接口传入。
    本服务仅用于处理用户拥有版权或已获授权的视频素材。

servers:
  - url: http://127.0.0.1:8080/api/v1
    description: 本地服务

tags:
  - name: Health
  - name: Uploads
  - name: Batches
  - name: Artifacts

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  /uploads/videos:
    post:
      tags: [Uploads]
      summary: 批量上传视频
      operationId: uploadVideos
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: binary
                  description: 支持服务端配置允许的格式，例如 MP4、MOV。
      responses:
        "201":
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadsResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "413":
          $ref: "#/components/responses/ErrorResponse"

  /batches:
    post:
      tags: [Batches]
      summary: 开始批量处理
      description: 创建异步批次；前端使用返回的批次 ID 轮询处理进度。
      operationId: createBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
            example:
              upload_ids:
                - 7299805d-e188-481e-9ef4-f6915af55bd0
                - 9fbfcd61-9519-4513-b234-8ff483e452b3
              output_directory: ./storage/outputs
              concurrency: 2
              narration:
                enabled: true
                language: zh-TW
                voice_prompt: 成熟、克制、略带悬疑感
              deduplication:
                change_file_hash: true
                reencode: true
                color_noise_tweak: true
                border_mode: blurred
                sticker: false
                subtitle_mask: true
                crop_scale: true
                mirror: false
                speed_tweak: true
      responses:
        "202":
          description: 批次已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"

  /batches/{batch_id}:
    get:
      tags: [Batches]
      summary: 查询批次进度和结果
      operationId: getBatch
      parameters:
        - $ref: "#/components/parameters/BatchId"
      responses:
        "200":
          description: 批次状态；建议处理期间每 1 至 2 秒轮询一次。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /artifacts/{artifact_id}/download:
    get:
      tags: [Artifacts]
      summary: 下载处理后的视频
      operationId: downloadArtifact
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "200":
          description: 视频文件
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/ErrorResponse"

components:
  parameters:
    BatchId:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: 请求失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          description: 稳定的机器可读错误码。
          examples: [INVALID_REQUEST, FILE_TOO_LARGE, PROCESSING_FAILED]
        message:
          type: string
          description: 可直接展示或记录的错误说明。

    Upload:
      type: object
      additionalProperties: false
      required: [id, file_name, size_bytes]
      properties:
        id:
          type: string
          format: uuid
        file_name:
          type: string
        size_bytes:
          type: integer
          format: int64
          minimum: 0

    UploadsResponse:
      type: object
      additionalProperties: false
      required: [uploads]
      properties:
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/Upload"

    BatchCreateRequest:
      type: object
      additionalProperties: false
      required: [upload_ids, output_directory]
      properties:
        upload_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            format: uuid
        output_directory:
          type: string
          minLength: 1
          description: 服务端可写的导出目录；服务端必须校验并限制允许的路径范围。
        concurrency:
          type: integer
          minimum: 1
          maximum: 16
          default: 1
          description: 同时处理的视频数量。
        narration:
          $ref: "#/components/schemas/NarrationOptions"
        deduplication:
          $ref: "#/components/schemas/DeduplicationOptions"

    NarrationOptions:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          default: false
          description: 开启后由服务端完成视频分析、文案生成、TTS、字幕和音视频合成。
        language:
          type: string
          default: zh-CN
          description: 解说语言或口音，例如 zh-CN、zh-TW。
        voice_id:
          type: string
          description: 可选音色；不传时使用服务端默认音色。
        voice_prompt:
          type: string
          maxLength: 500
          description: 可选的语气描述。

    DeduplicationOptions:
      type: object
      additionalProperties: false
      properties:
        change_file_hash:
          type: boolean
          default: true
          description: 改变输出文件的二进制摘要。
        reencode:
          type: boolean
          default: true
        color_noise_tweak:
          type: boolean
          default: false
          description: 随机微调亮度、对比度、饱和度并添加轻微噪点。
        border_mode:
          type: string
          enum: [none, blurred, solid]
          default: none
        sticker:
          type: boolean
          default: false
        subtitle_mask:
          type: boolean
          default: false
        crop_scale:
          type: boolean
          default: false
          description: 随机轻微裁剪或缩放。
        mirror:
          type: boolean
          default: false
          description: 随机决定是否水平镜像。
        speed_tweak:
          type: boolean
          default: false
          description: 在服务端安全范围内随机微调视频和音频速度。

    BatchStatus:
      type: string
      enum: [queued, processing, succeeded, partially_succeeded, failed]

    JobStatus:
      type: string
      enum: [queued, processing, succeeded, failed]

    JobStage:
      type: string
      enum: [queued, analyzing, synthesizing, processing, completed]

    VideoJob:
      type: object
      additionalProperties: false
      required: [id, upload_id, file_name, status, stage, progress]
      properties:
        id:
          type: string
          format: uuid
        upload_id:
          type: string
          format: uuid
        file_name:
          type: string
        status:
          $ref: "#/components/schemas/JobStatus"
        stage:
          $ref: "#/components/schemas/JobStage"
        progress:
          type: integer
          minimum: 0
          maximum: 100
        message:
          type: string
          description: 前端状态提示，例如“处理中”或“处理成功了”。
        output_path:
          type: string
          description: 成功后的视频保存路径。
        artifact_id:
          type: string
          format: uuid
          description: 成功后用于下载视频的产物 ID。
        error:
          oneOf:
            - $ref: "#/components/schemas/Error"
            - type: "null"

    Batch:
      type: object
      additionalProperties: false
      required: [id, status, progress, total, succeeded, failed, jobs]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/BatchStatus"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: 整个批次的百分比进度。
        total:
          type: integer
          minimum: 1
        succeeded:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/VideoJob"

    BatchResponse:
      type: object
      additionalProperties: false
      required: [batch]
      properties:
        batch:
          $ref: "#/components/schemas/Batch"
